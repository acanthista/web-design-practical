<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Semantic Structure</title>
</head>

<body>

    <!-- Header Section -->
    <header>
        <h1>My Website</h1>
        <p>Welcome to my HTML5 semantic webpage</p>
    </header>

    <!-- Main Section -->
    <section>
        <h2>Main Content Section</h2>

        <!-- Article 1 -->
        <article>
            <h3>Article One</h3>
            <p>This is the first article. Articles represent independent pieces of content.</p>
        </article>

        <!-- Article 2 -->
        <article>
            <h3>Article Two</h3>
            <p>This is the second article. Each article can stand alone.</p>
        </article>

    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 My Website | All Rights Reserved</p>
    </footer>

</body>
</html>
